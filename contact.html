<div class="container mt-5">
    <h1 class="text-center mb-4">Contact Us</h1>
    <p class="text-center mb-4">Have issues with your store orders? Contact us below.</p>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <form onsubmit="return contactMessage()">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="subject">Issue Type</label>
                    <select class="form-control" id="subject" name="subject" required>
                        <option value="">Select Issue Type</option>
                        <option value="order">Order Problem</option>
                        <option value="payment">Payment Issue</option>
                        <option value="shipping">Shipping/Delivery</option>
                        <option value="product">Product Quality</option>
                        <option value="refund">Refund Request</option>
                        <option value="other">Other Store Issue</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea class="form-control" id="message" name="message" rows="5" placeholder="Describe your issue in detail..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Send Message</button>
            </form>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
